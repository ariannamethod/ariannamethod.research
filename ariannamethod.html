// ═══════════════════════════════════════════════════════════════════
// PARSER / HELPERS
// ═══════════════════════════════════════════════════════════════════
function parseVocab(text){
  const words = [];
  const cats = {};
  let cat = 'uncategorized';
  const seen = new Set();
  for(const rawLine of text.split('\n')){
    const line = rawLine.trim();
    if(!line) continue;
    if(line.startsWith('#')){
      cat = line.slice(1).trim().toLowerCase();
      cats[cat] = cats[cat] || [];
      continue;
    }
    const w = line.toLowerCase().trim();
    if(w && !seen.has(w)){
      seen.add(w);
      words.push(w);
      cats[cat] = cats[cat] || [];
      cats[cat].push(w);
    }
  }
  return {words, cats};
}

function wordToCat(word, cats){
  for(const [cat, ws] of Object.entries(cats)){
    if(ws.includes(word)) return cat;
  }
  return null;
}

function charBigrams(word){
  const out = new Set();
  if(word.length <= 1){
    out.add(word);
    return out;
  }
  for(let i=0;i<word.length-1;i++) out.add(word.slice(i,i+2));
  return out;
}

// FNV-1a hash embedding, matched conceptually to Python version
function hashEmbed(word){
  let h = 2166136261 >>> 0;
  for(let i=0;i<word.length;i++){
    h ^= word.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  const vec = [];
  for(let i=0;i<DIM;i++){
    h ^= h >>> 13;
    h = Math.imul(h, 1597334677) >>> 0;
    h ^= h >>> 16;
    vec.push((h & 0xFFFF) / 32768.0 - 1.0);
  }
  const norm = Math.sqrt(vec.reduce((s,x)=>s+x*x,0)) + 1e-10;
  return vec.map(x => x / norm);
}

function cosineSim(a,b){
  let s = 0;
  for(let i=0;i<a.length;i++) s += a[i]*b[i];
  return s;
}

function softmaxVec(logits){
  const mx = Math.max(...logits);
  const exps = logits.map(v => Math.exp(v - mx));
  const total = exps.reduce((a,b)=>a+b,0) + 1e-10;
  return exps.map(e => e/total);
}

function rmsnorm(x){
  const ms = x.reduce((s,v)=>s+v*v,0) / Math.max(x.length,1);
  const scale = 1 / Math.sqrt(ms + 1e-5);
  return x.map(v => v * scale);
}

function phonetic(word){
  let w = word;
  if(w.length > 3 && w.endsWith('e') && !"aeiou".includes(w[w.length-2])) w = w.slice(0,-1);
  let lastV = -1;
  for(let i=0;i<w.length;i++) if("aeiou".includes(w[i])) lastV = i;
  return lastV >= 0 ? w.slice(lastV) : w.slice(-3);
}
function rhymes(a,b){
  return a !== b && a.length > 2 && b.length > 2 && phonetic(a) === phonetic(b);
}
function bar(v){
  const n = Math.floor(v * 20);
  return '#'.repeat(n) + '.'.repeat(20 - n);
}
function sampleShuffled(arr, n){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0,n);
}

// ═══════════════════════════════════════════════════════════════════
// DETERMINISTIC PRNG for ghost transformer weights
// ═══════════════════════════════════════════════════════════════════
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}
function gaussian(rand, std=1){
  let u = 0, v = 0;
  while(u === 0) u = rand();
  while(v === 0) v = rand();
  const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2*Math.PI*v);
  return z * std;
}

function linear(x, w){
  const out = new Float64Array(w.length);
  for(let r=0;r<w.length;r++){
    let s = 0;
    const row = w[r];
    for(let c=0;c<row.length;c++) s += row[c] * x[c];
    out[r] = s;
  }
  return out;
}

// GHOST TRANSFORMER — same architectural spirit as Python version
// ═══════════════════════════════════════════════════════════════════
class GhostTransformer {
  constructor(vocabSize){
    this.V = vocabSize;
    const rand = mulberry32(42);
    this.wte = makeMatrix(vocabSize, DIM, rand, 0.08);
    this.wpe = makeMatrix(BLOCK_SIZE, DIM, rand, 0.08);
    this.lmHead = makeMatrix(vocabSize, DIM, rand, 0.08);
    this.layers = [];
    for(let i=0;i<N_LAYER;i++){
      this.layers.push({
        wq: makeMatrix(DIM, DIM, rand, 0.08),
        wk: makeMatrix(DIM, DIM, rand, 0.08),
        wv: makeMatrix(DIM, DIM, rand, 0.08),
        wo: makeMatrix(DIM, DIM, rand, 0.08),
        wr: makeMatrix(BLOCK_SIZE, DIM, rand, 0.08), // RRPRAM: DIM → positions
        gate: [gaussian(rand, 0.1)],                   // blend gate
        ff1: makeMatrix(4*DIM, DIM, rand, 0.08),
        ff2: makeMatrix(DIM, 4*DIM, rand, 0.08),
      });
    }
    this.nParams = vocabSize*DIM*2 + DIM*BLOCK_SIZE +
      N_LAYER*(4*DIM*DIM + DIM*BLOCK_SIZE + 1 + 4*DIM*DIM + DIM*4*DIM);
  }

  forward(tokenIds, kvCache){
    const pos = kvCache[0].k.length ? kvCache[0].k.length : 0;
    const tid = ((tokenIds[tokenIds.length-1] % this.V) + this.V) % this.V;

    let x = new Float64Array(DIM);
    for(let i=0;i<DIM;i++) x[i] = this.wte[tid][i] + this.wpe[pos % BLOCK_SIZE][i];
    x = rmsnorm(Array.from(x));

    for(let li=0;li<this.layers.length;li++){
      const layer = this.layers[li];
      const xr = x.slice();
      x = rmsnorm(x);

      const q = Array.from(linear(x, layer.wq));
      const k = Array.from(linear(x, layer.wk));
      const v = Array.from(linear(x, layer.wv));

      kvCache[li].k.push(k);
      kvCache[li].v.push(v);
      const seqLen = kvCache[li].k.length;

      // ── QKV multi-head attention ──
      const xQkv = [];
      for(let h=0;h<N_HEAD;h++){
        const hs = h * HEAD_DIM;
        const qh = q.slice(hs, hs + HEAD_DIM);
        const scores = [];
        for(let t=0;t<seqLen;t++){
          const kh = kvCache[li].k[t].slice(hs, hs + HEAD_DIM);
          let dot = 0;
          for(let j=0;j<HEAD_DIM;j++) dot += qh[j] * kh[j];
          scores.push(dot / Math.sqrt(HEAD_DIM));
        }
        const w = softmaxVec(scores);
        for(let j=0;j<HEAD_DIM;j++){
          let val = 0;
          for(let t=0;t<seqLen;t++) val += w[t] * kvCache[li].v[t][hs + j];
          xQkv.push(val);
        }
      }

      // ── RRPRAM: positional routing (x @ W_r → position scores) ──
      const rrpAll = Array.from(linear(x, layer.wr));
      const rrpScores = rrpAll.slice(0, seqLen);
      const rrpW = softmaxVec(rrpScores);
      const xRrp = [];
      for(let j=0;j<DIM;j++){
        let val = 0;
        for(let t=0;t<seqLen;t++) val += rrpW[t] * kvCache[li].v[t][j];
        xRrp.push(val);
      }

      // ── gated blend: sigmoid(gate) * QKV + (1-g) * RRPRAM ──
      const g = 1.0 / (1.0 + Math.exp(-layer.gate[0]));
      const xBlend = xQkv.map((a,i) => g * a + (1.0 - g) * xRrp[i]);

      let proj = Array.from(linear(xBlend, layer.wo));
      x = proj.map((val,i) => val + xr[i]);

      const xr2 = x.slice();
      x = rmsnorm(x);
      let h1 = Array.from(linear(x, layer.ff1));
      h1 = h1.map(val => Math.max(0, val));
      let ff = Array.from(linear(h1, layer.ff2));
      x = ff.map((val,i) => val + xr2[i]);
    }

    x = rmsnorm(x);
    return Array.from(linear(x, this.lmHead));
  }
}

// ═══════════════════════════════════════════════════════════════════
// METAWEIGHTS — same logic as Python version
// ═══════════════════════════════════════════════════════════════════
class MetaWeights {
  constructor(words){
    this.words = words;
    this.w2i = {};
    words.forEach((w,i)=>this.w2i[w]=i);
    this.V = words.length;
    this.bigram = new Map();
    this.cooc = new Map();
    this.prophecy = new Map();
    this.destiny = new Float64Array(this.V);
    this.trauma = 0.0;
    this._buildFromOrdering();
    this._buildFromCorpus();
    this._buildSPA();
  }
  _bgKey(a,b){ return `${a},${b}`; }
  _coKey(a,b){ return `${Math.min(a,b)},${Math.max(a,b)}`; }

  _buildFromOrdering(){
    for(let i=0;i<this.V;i++){
      for(let j=Math.max(0, i-5); j<Math.min(this.V, i+6); j++){
        if(i === j) continue;
        const decay = 1.0 / (1.0 + Math.abs(i-j));
        const key = this._coKey(i,j);
        this.cooc.set(key, (this.cooc.get(key) || 0) + decay);
        if(j === i+1){
          const k = this._bgKey(i,j);
          this.bigram.set(k, (this.bigram.get(k) || 0) + 1.0);
        }
      }
    }
  }

  _buildFromCorpus(){
    const corpusWords = SEED_CORPUS.toLowerCase().split(/\s+/)
      .map(w => w.replace(/[.,!?]/g,''))
      .filter(w => this.w2i[w] !== undefined);
    for(let i=0;i<corpusWords.length-1;i++){
      const a = this.w2i[corpusWords[i]];
      const b = this.w2i[corpusWords[i+1]];
      const bg = this._bgKey(a,b);
      const co = this._coKey(a,b);
      this.bigram.set(bg, (this.bigram.get(bg) || 0) + 2.0);
      this.cooc.set(co, (this.cooc.get(co) || 0) + 1.0);
    }
  }

  _buildSPA(){
    // SPA: Sentence-level Positional Attention (from Q).
    // Multi-word entries sharing content words get co-occurrence boost.
    const wordIndex = {};
    for(let i=0;i<this.V;i++){
      const tokens = this.words[i].toLowerCase().split(/\s+/);
      if(tokens.length < 2) continue;
      for(let tok of tokens){
        tok = tok.replace(/[.,!?;:"'\-\(\)\[\]]/g, '');
        if(tok.length > 3){
          if(!wordIndex[tok]) wordIndex[tok] = [];
          wordIndex[tok].push(i);
        }
      }
    }
    // MK-8: scale the cap with vocab (was hard 50 → dropped novel resonators);
    // V//50 keeps the default at 50, admits ~2% of words.
    const cap = Math.max(50, Math.floor(this.V / 50));
    for(const ids of Object.values(wordIndex)){
      if(ids.length < 2 || ids.length > cap) continue;
      for(let i=0;i<ids.length;i++){
        for(let j=i+1;j<Math.min(i+10, ids.length);j++){
          const key = this._coKey(ids[i], ids[j]);
          this.cooc.set(key, (this.cooc.get(key) || 0) + 0.3);
        }
      }
    }
  }

  bi(a,b){ return this.bigram.get(this._bgKey(a,b)) || 0.001; }
  hebb(a,b){ return this.cooc.get(this._coKey(a,b)) || 0.0; }
  proph(wid){ return this.prophecy.get(wid) || 0.0; }
  addProphecy(wid, debt=1.0){ this.prophecy.set(wid, this.proph(wid) + debt); }
  fulfill(wid){ this.prophecy.delete(wid); }
  updateOnline(prev, curr){
    const ck = this._coKey(prev,curr);
    const bk = this._bgKey(prev,curr);
    this.cooc.set(ck, (this.cooc.get(ck) || 0) + 0.5);
    this.bigram.set(bk, (this.bigram.get(bk) || 0) + 0.5);
    this.trauma = Math.min(1.0, this.trauma + 0.05) * 0.97;
  }
}

// ═══════════════════════════════════════════════════════════════════
// KURAMOTO CHAMBERS
// ═══════════════════════════════════════════════════════════════════
class KuramotoChambers {
  constructor(){
    this.act = CHAMBERS.map(() => Math.random() * 0.2);
  }
  excite(word, cats){
    const cat = wordToCat(word, cats);
    let idx = null;
    if(cat && CAT_TO_CHAMBER[cat] !== undefined){
      idx = CAT_TO_CHAMBER[cat];
    } else {
      // MK-5: fed entries are whole lines/sentences with no category — scan their
      // tokens against the somatic lexicon so uncategorized text still excites the
      // nervous system (was silent → chambers dead on books).
      for(let tok of word.toLowerCase().split(/\s+/)){
        tok = tok.replace(/[.,!?;:"'\-\(\)\[\]]/g, '');
        if(MOOD_LEXICON[tok] !== undefined){ idx = MOOD_LEXICON[tok]; break; }
      }
    }
    if(idx !== null){
      this.act[idx] = Math.min(1.0, this.act[idx] + 0.25);
    }
  }
  step(){
    for(let iter=0; iter<CROSSFIRE_ITER; iter++){
      const old = [...this.act];
      for(let i=0;i<this.act.length;i++){
        this.act[i] *= CHAMBER_DECAY[i];
        for(let j=0;j<this.act.length;j++){
          if(i !== j) this.act[i] += CROSSFIRE_K * Math.sin(old[j] - old[i]);
        }
        this.act[i] = Math.max(0.0, Math.min(1.0, this.act[i]));
      }
    }
  }
  tauMod(){
    return 1.0 + 0.3 * this.act[1] - 0.2 * this.act[2] + 0.15 * this.act[4];
  }
  display(){
    return this.act
      .map((v,i) => v > 0.08 ? `${CHAMBERS[i]}:${v.toFixed(2)}` : null)
      .filter(Boolean)
      .join(' ');
  }
}

// MYCELIUM — the memory organ (kk x llm-wiki, no LLM, no weights)
// Character-n-gram hashing fills kk's empty embedder slot: word resemblance
// in any script, zero training. Ingest many books -> a compounding graph;
// unfold splices resonant fragments from all of them into one corpse.
// DOM-free by design (node-verifiable); persistence guards on localStorage.
// ═══════════════════════════════════════════════════════════════════
const MYC_DIM = 64;
const _gramCache = new Map();
function fnvVec(s){
  let v = _gramCache.get(s);

  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h,16777619)>>>0; }

}

function embedNgram(word, n=3){

  for(let i=0;i<=w.length-n;i++) grams.push(w.slice(i,i+n));
  if(grams.length===0) grams.push(w);
  const vec = new Array(MYC_DIM).fill(0);
  for(const g of grams){ const gv = fnvVec(g); for(let i=0;i<MYC_DIM;i++) vec[i]+=gv[i]; }
  const norm = Math.sqrt(vec.reduce((s,x)=>s+x*x,0)) + 1e-10;
  v = vec.map(x=>x/norm);
  _wordCache.set(word, v);
  return v;
}
const MYC_STOPS = new Set(("the a an and or but of to in on at is are was were be been it its this that "+
  "these those i you he she we they me him her us them my your his our their as by for with from into "+
  "over under so not no do does did have has had will would can could there here then than when where "+
  "what which who all any some more most").split(/\s+/));
// Segment the RAW text into sentence-ish entries, KEEPING each entry's char
// offset in the source so a click can open the document at the exact place.
function mycSegment(text){
  const entries = [];
  const re = /\S[^.!?]*[.!?]+|\S[^.!?]*$/g;
  let m;
  while((m = re.exec(text)) !== null){
    const raw = m[0];
    const norm = raw.split(/\s+/).join(" ").trim();
    if(norm.length > 12) entries.push({ text: norm, offset: m.index, end: m.index + raw.length });
    if(re.lastIndex === m.index) re.lastIndex++;   // guard against zero-width match
  }

}
function mycTokens(entry){
  return entry.toLowerCase().split(/\s+/)
    .map(t => t.replace(/^[.,!?;:"'()\[\]{}—–\-*_]+|[.,!?;:"'()\[\]{}—–\-*_]+$/g, ""))
    .filter(t => t.length > 2 && !MYC_STOPS.has(t));

function mycHash(s){
  let h = 2166136261 >>> 0;
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619) >>> 0; }

class Mycelium {
  constructor(){ this.entries=[]; this.freq={}; this.sources={}; this.edges={}; this.corpora=[]; this.raw={}; this.hashes={}; this.df={}; }

  ingest(text, source){
    if(!this.corpora.includes(source)) this.corpora.push(source);
    this.raw[source] = text;              // keep the raw doc so a click can open it at the exact place
    this.hashes[source] = mycHash(text);  // remember its bytes → re-eat only when they change
    for(const seg of mycSegment(text)){
      const toks = mycTokens(seg.text);
      if(toks.length < 2) continue;

    }

  }
  _index(toks, source){   // fold one fragment's tokens into freq / sources / edges / df
    for(let i=0;i<toks.length;i++){

      const s = new Set(this.sources[t]||[]); s.add(source); this.sources[t]=[...s].sort();

        .map(t => t.replace(/^[.,!?;:"'()\[\]{}—–\-*_]+|[.,!?;:"'()\[\]{}—–\-*_]+$/g, ""))

      const lean = this.entries.map(e => ({text:e.text, source:e.source, offset:e.offset, end:e.end}));

  }

// ENGINE
// ═══════════════════════════════════════════════════════════════════
class MicroKarpathy {
  constructor(vocabText){
    const {words, cats} = parseVocab(vocabText);
    this.words = words;
    this.cats = cats;
    this.vocabSet = new Set(words);
    this.w2i = {};
    words.forEach((w,i)=>this.w2i[w]=i);
    this.V = words.length;
    this.embeds = {};
    for(const w of words) this.embeds[w] = hashEmbed(w);

    this.meta = new MetaWeights(words);
    this.chambers = new KuramotoChambers();
    this.xf = new GhostTransformer(this.V);

    // MK-12: derive the corpus's own stop-words — most frequent tokens across
    // multi-word entries (a fed book's the/and/של). Word-per-line vocab -> none.
    const tf = new Map();
    let multiword = 0;
    for(const entry of words){
      const parts = entry.toLowerCase().split(/\s+/)
        .map(p => p.replace(/[.,!?;:"'\-\(\)\[\]]/g, ''));
      if(parts.length > 1) multiword++;
      for(const tok of parts){ if(tok.length > 1) tf.set(tok, (tf.get(tok)||0)+1); }
    }
    this.corpusStops = new Set();
    if(multiword > Math.floor(words.length / 4)){
      const top = [...tf.entries()].sort((a,b)=>b[1]-a[1]).slice(0,20);
      for(const [w,c] of top){ if(c >= 3) this.corpusStops.add(w); }
    }
  }

  // MK-10: nearestVocab removed — it was never called, and remapping a prompt word
  // to its "nearest" vocab word contradicts the design ("the autopsy dissects YOU,
  // not a proxy").

  dissect(prompt){
    const tokens = prompt.toLowerCase().split(/\s+/)
      .map(t => t.replace(/[.,!?;:"'\-\(\)\[\]]/g, ''));
    // MK-12: the corpus's own most-frequent words are its stop-words (organic
    // multilingual filtering — a novel's "the/and", a Hebrew file's "של/הוא").
    const stops = new Set(STOPS);
    for(const w of this.corpusStops) stops.add(w);
    // keep original words — don't remap. the autopsy dissects YOU, not a proxy.
    let cand = tokens.filter(t => t && !stops.has(t) && t.length > 1);
    if(cand.length === 0) cand = [this.words[0]];
    const seen = new Set();
    cand = cand.filter(w => { if(seen.has(w)) return false; seen.add(w); return true; });
    // MK-9: select the core by length + rarity + position + a sprinkle of chaos,
    // not just the first five; survivors kept in reading order.
    const score = (t, i) => {
      const length = t.length * 0.4;
      const rarity = this.vocabSet.has(t) ? 0.0 : 2.0;  // words outside the morgue are rarer
      const position = (1.0 - i / Math.max(cand.length, 1)) * 1.5;
      return length + rarity + position + Math.random() * 0.6;
    };
    const scores = cand.map((t,i) => score(t,i));
    const keep = new Set(
      cand.map((_,i) => i).sort((a,b) => scores[b] - scores[a]).slice(0, 5)
    );
    return cand.filter((_, i) => keep.has(i));
  }

  findNeighbors(word, n=TREE_WIDTH, exclude=null){
    const ex = exclude || new Set();
    const wid = this.w2i[word];
    if(wid === undefined){
      const vec = hashEmbed(word);
      const scored = this.words.filter(w => !ex.has(w)).map(w => [cosineSim(vec, this.embeds[w]), w]);
      scored.sort((a,b)=>b[0]-a[0]);
      return sampleShuffled(scored.slice(0, n*2).map(x=>x[1]), Math.min(n, scored.length));
    }

    let nLocal = n;
    const teleports = [];
    if(Math.random() < 0.4 && this.words.length > 100){
      const region = Math.floor(wid / 100);
      const distant = this.words.filter(w => Math.abs(Math.floor(this.w2i[w]/100) - region) >= 2 && !ex.has(w));
      if(distant.length){
        teleports.push(distant[Math.floor(Math.random() * distant.length)]);
        nLocal = n - 1;
      }
    }

    const scored = [];
    for(const w of this.words){
      if(w === word || ex.has(w)) continue;
      const oid = this.w2i[w];
      const h = this.meta.hebb(wid, oid);
      const c = cosineSim(this.embeds[word], this.embeds[w]);
      scored.push([h * 0.7 + c * 0.3, w]);
    }
    scored.sort((a,b)=>b[0]-a[0]);
    const top = scored.slice(0, nLocal * 2).map(x=>x[1]);
    return sampleShuffled(top, Math.min(nLocal, top.length)).concat(teleports);
  }

  buildTree(root, w=TREE_WIDTH, d=TREE_DEPTH, used=null){
    if(!used) used = new Set();
    used.add(root);
    if(d === 0) return {w: root, ch: []};
    const nbrs = this.findNeighbors(root, w, used);
    for(const n of nbrs) used.add(n);
    return {w: root, ch: nbrs.map(n => this.buildTree(n, w, d-1, used))};
  }

  collectLeaves(tree){
    if(!tree.ch.length) return [tree.w];
    const out = [];
    for(const c of tree.ch) out.push(...this.collectLeaves(c));
    return out;
  }

  darioSample(ctx, candidates, xfLogits, usedCats){
    if(!candidates.length) return Math.floor(Math.random()*this.V);
    const prev = ctx.length ? ctx[ctx.length-1] : 0;
    // MK-1: trauma modulates the TEMPERATURE (how sharply the corpse fixates), not
    // an additive constant that softmax cancels. More trauma -> cooler tau -> sharper.
    const tau = TAU_BASE * this.chambers.tauMod() * Math.max(0.5, 1.0 - 0.3 * this.meta.trauma);

    const scores = [];
    for(const cid of candidates){
      const T_x = cid < xfLogits.length ? xfLogits[cid] : 0.0;
      const B = BIGRAM_W * Math.log(this.meta.bi(prev, cid) + 1e-10);
      const H = ALPHA_D * this.meta.hebb(prev, cid);
      const F = BETA_D * this.meta.proph(cid);
      const A = GAMMA_D * this.meta.destiny[cid];  // MK-1: destiny varies per leaf (see reassemble)
      const region = Math.floor(cid / 100);
      const div = -1.5 * (usedCats[region] || 0);
      scores.push((T_x + B + H + F + A + div) / tau);
    }

    const probs = softmaxVec(scores);
    const indexed = probs.map((p,i)=>[i,p]).sort((a,b)=>b[1]-a[1]).slice(0, TOP_K);
    const top = indexed.map(([i,p]) => [candidates[i], p]);
    const total = top.reduce((s,x)=>s+x[1],0) + 1e-10;
    let r = Math.random(), cum = 0;
    for(const [wid,p] of top){
      cum += p / total;
      if(r <= cum) return wid;
    }
    return top[top.length-1][0];
  }

  reassemble(leafWords){
    // MK-2: keep branch multiplicity — how many tree branches reached each leaf.
    const rawIds = leafWords.map(w => this.w2i[w]).filter(v => v !== undefined);
    const leafIds = [...new Set(rawIds)];
    if(!leafIds.length) return [];

    // MK-1/MK-2: how many tree branches reached each leaf.
    const reach = new Map();
    for(const id of rawIds) reach.set(id, (reach.get(id)||0)+1);

    // MK-1: destiny = branch-reachability (was uniform +1.0 for every leaf, so A was
    // constant across candidates and softmax cancelled it). Leaves reached by more
    // branches pull harder; accumulates across autopsies when the engine persists.
    for(const [lid,cnt] of reach) this.meta.destiny[lid] += cnt;

    // MK-2: prophecy is owed to words several branches reached (cnt>1), not to an
    // arbitrary top-8 of an already-deduped list (every count would be 1).
    [...reach.entries()]
      .sort((a,b)=>b[1]-a[1])
      .slice(0,8)
      .forEach(([wid,cnt]) => { if(cnt > 1) this.meta.addProphecy(wid, cnt*0.5); });

    const kv = Array.from({length:N_LAYER}, () => ({k:[], v:[]}));
    const chain = [leafIds[Math.floor(Math.random()*leafIds.length)]];
    const used = new Set(chain);
    const usedCats = {};

    for(let i=0;i<CORPSE_LEN-1;i++){
      const logits = this.xf.forward(chain, kv);
      this.chambers.excite(this.words[chain[chain.length-1]], this.cats);
      this.chambers.step();

      let cands = leafIds.filter(id => !used.has(id));
      if(cands.length < 3) cands = leafIds;

      const nxt = this.darioSample(chain, cands, logits, usedCats);
      chain.push(nxt);
      used.add(nxt);

      const region = Math.floor(nxt / 100);
      usedCats[region] = (usedCats[region] || 0) + 1;

      this.meta.updateOnline(chain[chain.length-2], nxt);
      this.meta.fulfill(nxt);
    }

    return chain;
  }

  brodskyFormat(wordList){
    const out = [];
    let nn = 0;
    for(const w of wordList){
      const cat = wordToCat(w, this.cats);
      const isVerb = cat !== null && VERB_CATS.has(cat);

      if(isVerb){
        if(out.length) out.push('. ');
        out.push(w[0].toUpperCase() + w.slice(1));
        nn = 0;
      } else {
        if(!out.length){
          out.push(w[0].toUpperCase() + w.slice(1));
        } else if(nn >= 2){
          out.push(' — ' + w);
          nn = 0;
        } else {
          const last = out[out.length - 1];
          if(last && /[.!]$/.test(last)){
            out.push(' ' + w[0].toUpperCase() + w.slice(1));
          } else {
            out.push(', ' + w);
          }
        }
        nn += 1;
      }
    }
    return out.join('');
  }

  makeCoda(chain){
    const cw = chain.map(wid => this.words[wid]);
    const shuffled = [...cw].sort(() => Math.random() - 0.5);
    let end1 = null, end2 = null;

    for(const w1 of shuffled){
      for(const w2 of cw){
        if(rhymes(w1, w2)){ end1 = w1; end2 = w2; break; }
      }
      if(end1) break;
      for(const w2 of this.words){
        if(rhymes(w1, w2)){ end1 = w1; end2 = w2; break; }
      }
      if(end1) break;
    }
    if(!end1){ end1 = cw[0]; end2 = cw[cw.length-1]; }

    const body = cw.filter(w => w !== end1 && w !== end2);
    const mid = Math.max(Math.floor(cw.length / 2), 3);
    const l1Words = body.slice(0, mid-1).concat([end1]);
    let l2Words = body.slice(mid-1, mid+5).concat([end2]);
    if(l2Words.length < 3) l2Words = body.slice(1,5).concat([end2]);

    return [this.brodskyFormat(l1Words), this.brodskyFormat(l2Words)];
  }

  phonDiversity(ws){
    return new Set(ws.map(phonetic)).size / Math.max(ws.length, 1);
  }

  mutDepth(leaves){
    return Math.min(1.0, new Set(leaves).size / Math.max(leaves.length, 1));
  }
}

function scrollBottom(){ term.scrollTop = term.scrollHeight; }
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
// MK-11: same escaping typeText applies to content — user-controlled file names
// (e.g. "<img src=x onerror=alert(1)>.txt") must not reach innerHTML raw.
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function typeText(text, delay=10, cls=''){
  let html = term.innerHTML.replace(cursorHtml, '');
  const esc = (s) => s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch = esc(text[i]);
    html += cls ? `<span class="${cls}">${ch}</span>` : ch;
    term.innerHTML = html + cursorHtml;
    scrollBottom();
    await sleep(delay + Math.random()*6);
  }
}

async function printTree(tree, pre="", last=true){
  const conn = last ? "└─ " : "├─ ";
  await typeText(pre + conn, 2);
  // MYCELIUM: each mutation word is clickable — it grounds the dream in the real
  // corpus (concordance of sentences where the word actually lives in the books).
  appendLineNow(`<span class="word" data-w="${escHtml(tree.w)}">${escHtml(tree.w)}</span>\n`);
  await sleep(6);
  const childPre = pre + (last ? "   " : "│  ");
  for(let i=0;i<tree.ch.length;i++){
    await printTree(tree.ch[i], childPre, i === tree.ch.length-1);
  }
}

function appendLineNow(htmlLine){
  const html = term.innerHTML.replace(cursorHtml, '');

// feed .txt files — from the load button OR dragged onto the page. mycelium mode eats
// them into the memory organ; autopsy mode makes the first one the corpse.
function handleFiles(files){
  files = [...files].filter(f => /\.(txt|md|markdown|text)$/i.test(f.name) || (f.type||"").startsWith('text'));
  if(!files.length) return;
  if(mkMode === 'mycelium'){
    let done = 0, names = [];
    for(const file of files){
      const reader = new FileReader();
      reader.onload = (e) => {
        myc.ingest(String(e.target.result || ""), file.name);
        names.push(file.name); done++;
        if(done === files.length){
          myc.finalize();
          myc.save();
          appendLineNow(`\n<span class="bone">[mycelium ate ${escHtml(names.join(', '))} — ${myc.corpora.length} corpora, ${myc.entries.length} fragments]</span>\n`);
          inputEl.placeholder = `unfold from ${myc.corpora.length} text(s)…`;
        }
      };
      reader.readAsText(file);
    }
  } else {
    const file = files[0];
    const reader = new FileReader();
    reader.onload = (e) => {
      engine = new MicroKarpathy(String(e.target.result || ""));
      appendLineNow(`\n<span class="bone">[loaded ${engine.V} words from ${escHtml(file.name)}]</span>\n`);
    };
    reader.readAsText(file);
  }
}

function startMycelium(prompt){
  if(!myc.entries.length){
    appendLineNow(`\n<span class="blood">the mycelium is empty — switch the corpus (published · inwork · mixed) or load .txt.</span>\n`);
    return;
  }
  const r = myc.unfold(prompt, 9);
  appendLineNow(`\n<span class="bone">&gt; ${escHtml(prompt)}</span>\n`);
  appendLineNow(`  <span class="blood">── COMPOSITE (spliced from ${r.corpora.length}/${r.nCorpora} sources by resonance) ──</span>\n\n`);
  currentTree = r.fragments.map(f => ({src:f.source, off:f.offset, end:f.end}));   // walkable branches
  branchAt = -1;
  // resonance as typography: the stronger a fragment answered the prompt, the larger and
  // darker it renders; the weaker, the smaller and paler — the r-score read as font weight.
  const rs = r.fragments.map(f => f.score);
  const rMin = Math.min(...rs), rMax = Math.max(...rs), rSpan = (rMax - rMin) || 1;
  let html = "  ";
  r.fragments.forEach((f, i) => {
    const t = (f.score - rMin) / rSpan;                 // 0 weakest … 1 strongest in this unfold
    const fs = (12.5 + t * 4.0).toFixed(1);             // 12.5 … 16.5 px
    const op = (0.5 + t * 0.5).toFixed(2);              // 0.50 … 1.00 → pale to dark on white
    const cut = escHtml(f.text.length > 90 ? f.text.slice(0,90) : f.text);
    html += `<span class="frag" style="font-size:${fs}px;opacity:${op};vertical-align:middle" data-idx="${i}" data-src="${escHtml(f.source)}" data-off="${f.offset}" data-end="${f.end}">${cut}<span class="tag"> [${escHtml(f.source)} r=${f.score}]</span></span>.  `;
  });
  appendLineNow(html + "\n\n");
  appendLineNow(`  <span class="bone">click any fragment to open its source at the exact place it was drawn from.</span>\n\n`);
}

// delegated click: a fragment opens its source at the exact offset; a mutation word

            openSource(frag.dataset.src, +frag.dataset.off, +frag.dataset.end); return; }

// autopsy-word-click: click a mutation word → the sentences where it actually lives in
// the fed books, rendered as a small tree of clickable fragments (reuses openSource).
function concordance(word){
  const w = String(word).toLowerCase();
  if(!myc.entries.length){
    appendLineNow(`\n<span class="blood">  no corpus loaded — switch published/inwork/mixed (served) or load .txt to ground "${escHtml(word)}" in real sentences.</span>\n`);
    return;
  }
  const hits = [];
  for(const e of myc.entries){ if(e.toks.includes(w)){ hits.push(e); if(hits.length >= 6) break; } }
  if(!hits.length){
    appendLineNow(`\n<span class="blood">  "${escHtml(word)}" has no home in the books — the mutation is a dream, not a memory.</span>\n`);
    return;
  }
  currentTree = hits.map(e => ({src:e.source, off:e.offset, end:e.end}));   // the small tree → walkable
  branchAt = -1;
  let html = `\n  <span class="blood">where "${escHtml(word)}" lives:</span>\n`;
  for(let i=0;i<hits.length;i++){
    const e = hits[i];
    const conn = i === hits.length-1 ? "  └─ " : "  ├─ ";
    const cut = escHtml(e.text.length > 84 ? e.text.slice(0,84) : e.text);
    html += `${conn}<span class="frag" data-idx="${i}" data-src="${escHtml(e.source)}" data-off="${e.offset}" data-end="${e.end}">${cut}<span class="tag"> [${escHtml(e.source)}]</span></span>\n`;
  }
  appendLineNow(html + "\n");
}

function openSource(src, off, end){
  const raw = myc.raw[src];
  if(raw == null){
    appendLineNow(`\n<span class="blood">[${escHtml(src)} is no longer in the mycelium — reload the corpus and unfold again]</span>\n`);
    return;
  }
  const branch = (branchAt >= 0 && currentTree.length) ? `  ·  branch ${branchAt+1} / ${currentTree.length}` : "";
  srcTitle.textContent = `${src}  ·  char ${off} / ${raw.length}${branch}`;
  srcBody.innerHTML = escHtml(raw.slice(0, off))
    + `<span class="hl" id="hl">${escHtml(raw.slice(off, end))}</span>`
    + escHtml(raw.slice(end));
  srcEl.classList.remove('hidden');
  const hl = document.getElementById('hl');
  if(hl) hl.scrollIntoView({block:'center'});
}

// auto-charge from a corpus folder. The corpus switcher chooses which streams feed the
// mycelium: published/ · inwork/ · mixed (both). NO manifest — the engine lists a folder off
// the server's directory index and eats every .md/.txt, re-eating one only when its bytes
// change (content hash). README.md is skipped (an index, not a text). Needs the page SERVED
// (fetch + dir-listing are blocked on file://; there, feed files with load .txt).
const CORPUS_FOLDERS = { published: ['published'], inwork: ['inwork'], mixed: ['published','inwork'] };
let corpusMode = 'published';

function mycListDir(body){
  // a server's directory index may be JSON (["a.md", ...]) or HTML (<a href="a.md">) — accept both
  const t = body.trim();
  let names = [];
  if(t[0] === '['){ try { const a = JSON.parse(t); if(Array.isArray(a)) names = a.map(String); } catch(e){} }
  if(!names.length){
    const re = /href\s*=\s*["']([^"'?#]+)["']/gi; let m;
    while((m = re.exec(body))){
      let h = m[1];
      try { h = decodeURIComponent(h); } catch(e){}
      if(h.endsWith('/') || h.startsWith('..') || h.includes('://')) continue;
      names.push(h.split('/').pop());
    }
  }
  const seen = new Set();
  return names.filter(n => /\.(txt|md|markdown|text)$/i.test(n)
    && !/^readme\.md$/i.test(n)                       // the folder README is an index, not a text
    && !seen.has(n) && seen.add(n));
}

// scan one folder: fetch its dir-index, eat each file keyed as "folder/name" so published and
// inwork never collide and the source tag shows which stream a fragment came from.
async function scanFolder(folder){
  let body;
  try { const r = await fetch(folder + '/'); if(!r.ok) return {added:0, updated:0}; body = await r.text(); }
  catch(e){ return {added:0, updated:0}; }
  const files = mycListDir(body);
  let added = 0, updated = 0;
  for(const name of files){
    try {
      const fr = await fetch(folder + '/' + encodeURIComponent(name));
      if(!fr.ok) continue;
      const text = await fr.text();
      const key = folder + '/' + name;                        // source id carries the stream
      if(myc.hashes[key] === mycHash(text)) continue;         // unchanged — already eaten
      if(myc.corpora.includes(key)){ myc.dropSource(key); updated++; }
      else added++;
      myc.ingest(text, key);
    } catch(e){ /* skip an unreadable file */ }
  }
  return {added, updated};
}

// switch corpus: forget the current mycelium and eat the folders the mode selects. Called on
// boot and whenever the switcher changes — the two streams stay cleanly separated.
async function loadCorpus(mode){
  corpusMode = mode;
  myc = new Mycelium();
  try { localStorage.removeItem('mycelium'); } catch(e){}
  currentTree = []; branchAt = -1;
  let touched = 0;
  for(const folder of (CORPUS_FOLDERS[mode] || [])){
    const r = await scanFolder(folder);
    touched += r.added + r.updated;
  }
  if(touched){
    myc.finalize();
    myc.save();
    appendLineNow(`\n<span class="bone">[${mode}: ${myc.corpora.length} texts, ${myc.entries.length} fragments — flip to mycelium and unfold, or click a word in an autopsy to ground it.]</span>\n`);
  } else {
    appendLineNow(`\n<span class="bone">[${mode}: nothing served — run over a local server, or use load .txt. file:// blocks the folder scan.]</span>\n`);
  }
  if(mkMode === 'mycelium') inputEl.placeholder = `unfold from ${myc.corpora.length} text(s) — ${mode}…`;
}

async function startAutopsy(){
  const prompt = inputEl.value.trim();

  typing = true;
  inputEl.disabled = true;

  // MK-4: the morgue remembers its clients. Organs (meta/chambers/xf) persist across
  // autopsies, so destiny/trauma/prophecy/co-occurrence ACCUMULATE instead of dying
  // each run. Loading a new file rebuilds them via `new MicroKarpathy`.

  appendLineNow(`\n<span class="bone">&gt; ${prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>\n\n`);
  await sleep(180);

  await typeText("  ariannamethod — resonant autopsy\n\n");

  await typeText(`  vocab: ${engine.V} words | ghost params: ${engine.xf.nParams.toLocaleString()} | trained: 0\n\n`);
  await typeText("=".repeat(64) + "\n");
  await typeText("  AUTOPSY REPORT\n", 10, "blood");
  await typeText(`  Subject: "${prompt}"\n`);
  await typeText("=".repeat(64) + "\n\n");

  const core = engine.dissect(prompt);
  await typeText("  Core words: ");
  await typeText(core.join(" ") + "\n", 12, "bone");

  let allLeaves = [];
  for(const word of core){
    await typeText(`\n  Tree [${word}]:\n`, 7, 'blood');
    const tree = engine.buildTree(word);
    await printTree(tree, "    ", true);
    allLeaves.push(...engine.collectLeaves(tree));
  }

  const uniqueLeaves = [...new Set(allLeaves)];
  await typeText(`\n  Collected ${uniqueLeaves.length} unique leaves\n`);

  // MK-2: pass the RAW leaves (with multiplicity) so destiny/prophecy can weigh
  // words reached by several branches. uniqueLeaves stays display-only.
  const chain = engine.reassemble(allLeaves);
  const corpse = chain.map(wid => engine.words[wid]);

  await typeText(`\n  ── COMPOSITE ──────────────────────────────────────────────────────\n`, 5, 'blood');

  if(corpse.length >= 5){
    const tmpl = TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];
    const fill = sampleShuffled(corpse, Math.min(6, corpse.length));
    while(fill.length < 6) fill.push(corpse[0]);
    let sentence = tmpl;
    for(let i=0;i<6;i++) sentence = sentence.replace(`{${i}}`, fill[i] || '');
    await typeText(`  ${sentence}\n`, 18);
  }

  await typeText(`  ${corpse.join(" ")}.\n`, 18);

  const [l1, l2] = engine.makeCoda(chain);
  await typeText(`\n  ── CODA ──────────────────────────────────────────────────────────\n`, 5, 'blood');
  await typeText(`  ${l1},\n`, 24, 'blood');
  await typeText(`  ${l2}.\n`, 24, 'blood');

  const ch = engine.chambers.display();
  if(ch){
    await typeText(`\n  chambers: ${ch}\n`);
  }

  const pd = engine.phonDiversity(corpse);
  const md = engine.mutDepth(allLeaves);

  await typeText(`\n  ── METRICS ────────────────────────────────────────────────────────\n`, 5);
  await typeText(`  Phonetic Diversity: [${bar(pd)}] ${pd.toFixed(3)}\n`);
  await typeText(`  Mutation Depth:     [${bar(md)}] ${md.toFixed(3)}\n`);
  await typeText(`\n  Vocabulary: ${engine.V} | Co-occurrences: ${engine.meta.cooc.size}\n`);
  await typeText(`  Prophecies: ${engine.meta.prophecy.size} active | Trauma: ${engine.meta.trauma.toFixed(3)}\n`);

  appendLineNow(`\n<div class="signature">[autopsy complete. — ariannamethod.]</div>\n\n`);

  typing = false;
  inputEl.disabled = false;
  btnEl.disabled = false;
  inputEl.focus();
}

// boot banner
appendLineNow(
`<div class="masthead">Arianna Method Research</div>` +
`<div class="subhead">A resonant engine that reads a corpus as a field, not a store. Switch the corpus — published · inwork · mixed — then dissect a prompt, or unfold a composite in mycelium mode.</div>\n`
);
</script>
